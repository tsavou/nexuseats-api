name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run build

  unit-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run prisma:generate
      - run: npm run test -- --coverage --runInBand

  integration-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexuseats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d nexuseats_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/nexuseats_test
      - run: npm run test:e2e -- --runInBand --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/nexuseats_test
          DATABASE_URL_TEST: postgresql://test:test@localhost:5432/nexuseats_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  contract-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexuseats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d nexuseats_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/nexuseats_test
      - run: npm run test:contract:consumer
      - run: npm run test:contract:provider -- --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/nexuseats_test
          DATABASE_URL_TEST: postgresql://test:test@localhost:5432/nexuseats_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
