services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexuseats-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexuseats
      POSTGRES_PASSWORD: nexuseats_prod
      POSTGRES_DB: nexuseats
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuseats -d nexuseats']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexuseats-redis-prod
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RabbitMQ ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexuseats-rabbitmq-prod
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: nexuseats
      RABBITMQ_DEFAULT_PASS: secret
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── NexusEats API ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuseats-api-prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://nexuseats:nexuseats_prod@postgres:5432/nexuseats
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://nexuseats:secret@rabbitmq:5672
      JWT_SECRET: nexuseats-jwt-secret-prod-2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── pgAdmin (BONUS) ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexuseats-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexuseats.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
